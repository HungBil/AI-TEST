name: Validate exam data and app build

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'CONTRIBUTING.md'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/validate-exams.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate schema and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate exam JSON files
        run: npm run validate

      - name: Build app
        run: npm run build
